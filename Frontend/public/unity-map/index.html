<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <title>Unity + Mapbox (Secure Integrated View)</title>
    <!-- Mapbox v3.1.2 (Latest compatible for the project logic) -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet" />
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #fff;
        }

        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #close-btn {
            position: absolute;
            top: 0;
            left: 0;
            width: 500px;
            height: 400px;
            z-index: 10;
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease-in-out;
            transform: translate(-50%, calc(-100% - 40px));
            overflow: hidden;
            background: transparent;
        }

        #unity-container.active {
            visibility: visible;
            opacity: 1;
            pointer-events: auto;
        }

        #unity-canvas {
            width: 100% !important;
            height: 100% !important;
            pointer-events: auto !important;
            outline: none !important;
            border: none !important;
            box-shadow: none !important;
        }

        #close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            z-index: 200;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        #unity-loading-bar {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            display: block;
            z-index: 100;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        #unity-progress-bar-empty {
            width: 140px;
            height: 18px;
            background: #ccc;
            margin-top: 10px;
        }

        #unity-progress-bar-full {
            width: 0%;
            height: 100%;
            background: #4CAF50;
        }

        .marker-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1;
            transition: z-index 0.3s;
            pointer-events: auto;
        }

        .marker-wrapper:hover {
            z-index: 100;
        }

        .custom-marker {
            width: 60px;
            height: 60px;
            position: relative;
            cursor: pointer;
        }

        .custom-marker img {
            position: absolute;
            width: 45px;
            height: 45px;
            object-fit: cover;
            border: 2px solid white;
            border-radius: 4px;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            background: #eee;
        }

        .custom-marker img:nth-child(1) {
            top: 8px;
            left: 8px;
            transform: rotate(-12deg);
            z-index: 1;
        }

        .custom-marker img:nth-child(2) {
            top: 8px;
            left: 8px;
            transform: rotate(3deg);
            z-index: 2;
        }

        .custom-marker img:nth-child(3) {
            top: 8px;
            left: 8px;
            transform: rotate(15deg);
            z-index: 3;
        }

        .marker-wrapper:hover .custom-marker img:nth-child(1) {
            transform: translate(-30px, -10px) rotate(-25deg) scale(1.5);
            z-index: 4;
        }

        .marker-wrapper:hover .custom-marker img:nth-child(2) {
            transform: translate(0px, -25px) rotate(0deg) scale(1.5);
            z-index: 5;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        .marker-wrapper:hover .custom-marker img:nth-child(3) {
            transform: translate(30px, -10px) rotate(25deg) scale(1.5);
            z-index: 6;
        }

        .date-label {
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 5px;
            white-space: nowrap;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <div id="unity-container">
        <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
        <button id="close-btn" onclick="closeUnity()">✕</button>
    </div>
    <div id="unity-loading-bar">
        <div>Unity Loading...</div>
        <div id="unity-progress-bar-empty">
            <div id="unity-progress-bar-full"></div>
        </div>
    </div>

    <script>
        let supabaseClient = null;
        let isInitialized = false;
        let map = null;
        let rawDBData = [];
        let htmlMarkers = {};
        let activeSourceIds = [];
        let sourceDateMap = {};
        let currentMode = "MAP";
        let hasFlown = false;
        let myUnityInstance = null;
        let activeMarkerLngLat = null;
        let lastCaptureTime = 0;

        const container = document.querySelector("#unity-container");
        const canvas = document.querySelector("#unity-canvas");
        const loadingBar = document.querySelector("#unity-loading-bar");
        const progressBarFull = document.querySelector("#unity-progress-bar-full");

        // React 부모로부터 설정 수신
        window.addEventListener('message', (event) => {
            if (!event.data) return;
            if (event.data.type === 'INIT_CONFIG') {
                if (isInitialized) return;
                console.log("📥 [Iframe] Config received:", event.data.data);

                // 설정 수신 알림
                window.parent.postMessage({ type: 'CONFIG_RECEIVED' }, '*');

                const { supabaseUrl, supabaseKey, mapboxToken } = event.data.data;

                if (mapboxToken && !map) {
                    isInitialized = true;
                    // 토큰 정제 (공백 및 따옴표 제거)
                    const cleanToken = mapboxToken.trim().replace(/^["']|["']$/g, '');
                    console.log("🗺️ [Iframe] Initializing Mapbox v3 with secure token (length: " + cleanToken.length + ")");

                    if (window.mapboxgl) {
                        window.mapboxgl.accessToken = cleanToken;
                    }

                    // 토큰 반영 및 안정성을 위한 딜레이
                    setTimeout(() => {
                        initializeMap(cleanToken);
                    }, 100);
                }

                if (!supabaseClient && supabaseUrl && supabaseKey) {
                    console.log("🔐 [Iframe] Initializing Supabase client for potential use...");
                    supabaseClient = window.supabase.createClient(supabaseUrl.trim(), supabaseKey.trim());
                }
            }

            if (event.data.type === 'UPDATE_MARKERS') {
                const photos = event.data.data;
                console.log("📥 [Iframe] Updating markers:", photos.length, "photos");
                rawDBData = photos;
                if (map && map.isStyleLoaded()) {
                    applyMapMode();
                } else if (map) {
                    map.once('style.load', () => applyMapMode());
                }
            }
        });

        // Unity 로더
        const buildUrl = "Build";
        const unityConfig = {
            dataUrl: buildUrl + "/webgl.data", frameworkUrl: buildUrl + "/webgl.framework.js",
            codeUrl: buildUrl + "/webgl.wasm", streamingAssetsUrl: "StreamingAssets",
            companyName: "DefaultCompany", productName: "MapBoxweb", productVersion: "0.1.0",
            devicePixelRatio: 1,
        };

        const script = document.createElement("script");
        script.src = buildUrl + "/webgl.loader.js";
        script.onload = () => {
            createUnityInstance(canvas, unityConfig, (progress) => { progressBarFull.style.width = 100 * progress + "%"; })
                .then((instance) => { myUnityInstance = instance; loadingBar.style.display = "none"; })
                .catch((err) => console.error("Unity loading failed:", err));
        };
        document.body.appendChild(script);

        function initializeMap(token) {
            if (!token || map) return;

            if (window.mapboxgl) {
                window.mapboxgl.accessToken = token;
            } else if (typeof mapboxgl !== 'undefined') {
                mapboxgl.accessToken = token;
            }

            console.log("🚀 Creating map instance...");
            map = new mapboxgl.Map({
                container: "map", style: "mapbox://styles/mapbox/streets-v12",
                center: [127.7669, 35.9078], zoom: 2.0, pitch: 0, projection: 'globe', preserveDrawingBuffer: true
            });

            map.on('error', (e) => {
                console.error("❌ [Mapbox Error]", e.error?.message || e);
            });

            map.on('style.load', () => {
                console.log("🎨 [Iframe] Map style loaded.");
                map.setFog({ 'color': 'rgb(186, 210, 235)', 'high-color': 'rgb(36, 92, 223)', 'horizon-blend': 0.02, 'space-color': 'rgb(11, 11, 25)', 'star-intensity': 0.6 });

                const layers = map.getStyle().layers;
                const labelLayerId = layers.find((layer) => layer.type === 'symbol' && layer.layout['text-field'])?.id;
                map.addLayer({
                    'id': 'add-3d-buildings', 'source': 'composite', 'source-layer': 'building',
                    'filter': ['==', 'extrude', 'true'], 'type': 'fill-extrusion', 'minzoom': 15,
                    'paint': {
                        'fill-extrusion-color': '#e0e0e0',
                        'fill-extrusion-height': ['interpolate', ['linear'], ['zoom'], 15, 0, 15.05, ['get', 'height']],
                        'fill-extrusion-base': ['interpolate', ['linear'], ['zoom'], 15, 0, 15.05, ['get', 'min_height']],
                        'fill-extrusion-opacity': 0.8
                    }
                }, labelLayerId);
            });

            map.on('render', updateMarkersRealtime);
            map.on('move', () => { updateUnityPosition(); handleMapInteraction(); });
            map.on('zoom', () => { updateUnityPosition(); handleMapInteraction(); });
            map.on('mousedown', () => closeUnity());
            map.on('wheel', () => closeUnity());
            map.on('touchstart', () => closeUnity());
        }

        function handleMapInteraction() {
            if (container.classList.contains('active')) {
                const now = Date.now();
                if (now - lastCaptureTime > 50) {
                    lastCaptureTime = now;
                    captureAndSendBackground();
                }
            }
        }

        function updateMarkersRealtime() {
            const activeLayers = activeSourceIds.map(sid => `inv-cluster-${sid}`).concat(activeSourceIds.map(sid => `inv-uncluster-${sid}`));
            if (activeLayers.length === 0 || !map.isStyleLoaded()) return;

            const features = map.queryRenderedFeatures({ layers: activeLayers });
            const keepMarkers = new Set();

            features.forEach(feature => {
                const coords = feature.geometry.coordinates;
                const sourceId = feature.layer.source;
                const dateStr = sourceDateMap[sourceId];
                const markerKey = feature.properties.cluster ? `cluster_${sourceId}_${feature.properties.cluster_id}` : `unclustered_${sourceId}_${feature.properties.id}`;
                keepMarkers.add(markerKey);

                if (!htmlMarkers[markerKey]) {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'marker-wrapper';
                    const innerEl = document.createElement('div');
                    innerEl.className = 'custom-marker';

                    if (feature.properties.cluster) {
                        map.getSource(sourceId).getClusterLeaves(feature.properties.cluster_id, 3, 0, (err, leaves) => {
                            if (err || !leaves) return;
                            let thumbUrls = [];
                            leaves.forEach(leaf => {
                                const urls = (leaf.properties.thumbnails || "").split('|').filter(Boolean);
                                thumbUrls = thumbUrls.concat(urls);
                            });

                            // Remove existing imgs before adding new ones
                            innerEl.innerHTML = '';
                            thumbUrls.slice(0, 3).forEach((url, idx) => {
                                if (url) {
                                    const img = document.createElement('img');
                                    img.src = url;
                                    img.style.zIndex = idx + 1;
                                    img.onerror = () => { img.style.backgroundColor = '#ddd'; };
                                    innerEl.appendChild(img);
                                }
                            });
                        });
                        wrapper.onclick = (e) => {
                            e.stopPropagation();
                            map.getSource(sourceId).getClusterLeaves(feature.properties.cluster_id, 999, 0, (err, leaves) => {
                                if (err || !leaves) return;
                                let urls = [];
                                leaves.forEach(l => {
                                    const leafUrls = (l.properties.urls || "").split('|').filter(Boolean);
                                    urls = urls.concat(leafUrls);
                                });
                                showUnity(markerKey, coords[0], coords[1], urls);
                            });
                        };
                    } else {
                        const thumbUrls = (feature.properties.thumbnails || "").split('|').filter(Boolean);
                        innerEl.innerHTML = '';
                        thumbUrls.slice(0, 3).forEach((url, idx) => {
                            if (url) {
                                const img = document.createElement('img');
                                img.src = url;
                                img.style.zIndex = idx + 1;
                                img.onerror = () => { img.style.backgroundColor = '#ddd'; };
                                innerEl.appendChild(img);
                            }
                        });
                        wrapper.onclick = (e) => {
                            e.stopPropagation();
                            showUnity(feature.properties.id, coords[0], coords[1], (feature.properties.urls || "").split('|').filter(Boolean));
                        };
                    }
                    wrapper.appendChild(innerEl);
                    if (currentMode === "DATE" && dateStr) {
                        const dateLabel = document.createElement('div');
                        dateLabel.className = 'date-label';
                        dateLabel.innerText = dateStr;
                        wrapper.appendChild(dateLabel);
                    }
                    htmlMarkers[markerKey] = new mapboxgl.Marker(wrapper).setLngLat(coords).addTo(map);
                } else {
                    htmlMarkers[markerKey].setLngLat(coords);
                }
            });

            for (const key in htmlMarkers) {
                if (!keepMarkers.has(key)) { htmlMarkers[key].remove(); delete htmlMarkers[key]; }
            }
        }

        function applyMapMode() {
            clearMapData();
            currentMode = "MAP";
            const features = rawDBData.map(loc => {
                // Handle different data structures safely
                const id = loc.id || (loc.location_id ? String(loc.location_id) : Math.random().toString());
                const lat = loc.lat || 0;
                const lng = loc.lng || loc.lon || 0;
                const thumbnails = loc.url || (loc.media && loc.media.length > 0 ? (loc.media[0].thumbnail_url || loc.media[0].file_url) : '');
                const fullUrls = loc.allUrls || (loc.media ? loc.media.map(m => m.file_url).join('|') : loc.url || '');

                return {
                    type: 'Feature',
                    geometry: { type: 'Point', coordinates: [lng, lat] },
                    properties: {
                        id: id,
                        urls: fullUrls,
                        thumbnails: thumbnails
                    }
                };
            });
            const sourceId = 'photos_map'; activeSourceIds.push(sourceId);
            map.addSource(sourceId, { type: 'geojson', data: { type: 'FeatureCollection', features }, cluster: true, clusterMaxZoom: 20, clusterRadius: 60 });
            map.addLayer({ id: `inv-cluster-${sourceId}`, type: 'circle', source: sourceId, filter: ['has', 'point_count'], paint: { 'circle-radius': 0, 'circle-opacity': 0 } });
            map.addLayer({ id: `inv-uncluster-${sourceId}`, type: 'circle', source: sourceId, filter: ['!', ['has', 'point_count']], paint: { 'circle-radius': 0, 'circle-opacity': 0 } });

            // 최초 로딩 시 랜덤 사진으로 비행
            if (rawDBData.length > 0 && !hasFlown) {
                const randomPhoto = rawDBData[Math.floor(Math.random() * rawDBData.length)];
                const lng = randomPhoto.lng || randomPhoto.lon || 0;
                const lat = randomPhoto.lat || 0;
                if (lng !== 0 || lat !== 0) {
                    console.log("✈️ [Iframe] Flying to random photo:", [lng, lat]);
                    map.flyTo({
                        center: [lng, lat],
                        zoom: 12,
                        essential: true,
                        duration: 5000 // 5초간 부드럽게 이동
                    });
                    hasFlown = true;
                }
            }
        }

        function applyDateMode() {
            // No longer used based on UI request, but keeping function empty to prevent errors
        }

        function clearMapData() {
            Object.values(htmlMarkers).forEach(m => m.remove());
            htmlMarkers = {};
            activeSourceIds.forEach(sid => {
                if (map.getSource(sid)) {
                    if (map.getLayer(`inv-cluster-${sid}`)) map.removeLayer(`inv-cluster-${sid}`);
                    if (map.getLayer(`inv-uncluster-${sid}`)) map.removeLayer(`inv-uncluster-${sid}`);
                    map.removeSource(sid);
                }
            });
            activeSourceIds = [];
            sourceDateMap = {};
        }

        function updateUnityPosition() {
            if (!activeMarkerLngLat || !map) return;
            const pos = map.project(activeMarkerLngLat);
            container.style.left = pos.x + "px"; container.style.top = pos.y + "px";
        }

        function showUnity(id, lng, lat, photoUrls) {
            if (!myUnityInstance) return;
            activeMarkerLngLat = [lng, lat];
            updateUnityPosition();

            // 1. 클릭 시 마커 위치로 줌인 (Focus)
            if (map) {
                map.flyTo({
                    center: [lng, lat],
                    zoom: 17,
                    essential: true,
                    duration: 1000 // 1초간 빠르게 확대
                });
            }

            const urlString = photoUrls.filter(u => u).join('|');

            // 2. 유니티 컨테이너 활성화 및 사진 전송
            setTimeout(() => {
                captureAndSendBackground();
                container.classList.add('active');

                // 유니티가 즉시 렌더링되도록 포커스 및 리사이즈 이벤트 강제 발생
                if (canvas) canvas.focus();
                window.dispatchEvent(new Event('resize'));

                setTimeout(() => {
                    myUnityInstance.SendMessage('MapManager', 'OpenCarouselWithUrls', urlString);
                    // 활성화 직후 다시 한번 리사이즈 트리거
                    window.dispatchEvent(new Event('resize'));
                }, 150);
            }, 50);
        }

        function closeUnity() {
            container.classList.remove('active'); activeMarkerLngLat = null;
            if (myUnityInstance) myUnityInstance.SendMessage('MapManager', 'CloseCarousel');
        }

        function captureAndSendBackground() {
            try {
                if (!myUnityInstance || !map) return;
                const mCanvas = map.getCanvas();
                const rect = container.getBoundingClientRect();
                const mRect = mCanvas.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                const temp = document.createElement('canvas');
                temp.width = rect.width * dpr; temp.height = rect.height * dpr;
                const ctx = temp.getContext('2d');
                ctx.drawImage(mCanvas, (rect.left - mRect.left) * dpr, (rect.top - mRect.top) * dpr, temp.width, temp.height, 0, 0, temp.width, temp.height);
                temp.toBlob(b => {
                    const blobUrl = URL.createObjectURL(b);
                    myUnityInstance.SendMessage('BackgroundReceiver', 'ReceiveBackgroundUrl', blobUrl);
                }, 'image/png');
            } catch (e) { }
        }

        // 초기화 완료 신호
        window.parent.postMessage({ type: 'IFRAME_READY' }, '*');
    </script>
</body>

</html>
